<!DOCTYPE html>
<html>
<head>
    <title>Sorting Complexity Visualizer</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 40px;
        }
        input {
            width: 300px;
            padding: 10px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
        }
        .result {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>Bubble Sort vs Merge Sort</h2>

<input type="text" id="inputArray" placeholder="Enter numbers (e.g. 5,3,8,1)">
<br>
<button onclick="runSort()">Compute</button>

<div class="result">
    <h3>Results:</h3>
    <p id="bubbleResult"></p>
    <p id="mergeResult"></p>
</div>

<script>

// Bubble Sort
function bubbleSort(arr) {
    let a = [...arr];
    let comparisons = 0;

    for (let i = 0; i < a.length; i++) {
        for (let j = 0; j < a.length - i - 1; j++) {
            comparisons++;
            if (a[j] > a[j + 1]) {
                [a[j], a[j + 1]] = [a[j + 1], a[j]];
            }
        }
    }

    return { sorted: a, comparisons };
}

// Merge Sort
function mergeSort(arr) {
    let comparisons = 0;

    function merge(left, right) {
        let result = [];
        let i = 0, j = 0;

        while (i < left.length && j < right.length) {
            comparisons++;
            if (left[i] < right[j]) {
                result.push(left[i++]);
            } else {
                result.push(right[j++]);
            }
        }

        return result.concat(left.slice(i)).concat(right.slice(j));
    }

    function divide(arr) {
        if (arr.length <= 1) return arr;

        let mid = Math.floor(arr.length / 2);
        return merge(divide(arr.slice(0, mid)), divide(arr.slice(mid)));
    }

    let sorted = divide(arr);
    return { sorted, comparisons };
}

// Main function
function runSort() {
    let input = document.getElementById("inputArray").value;
    let arr = input.split(",").map(Number);

    // Bubble Sort
    let start1 = performance.now();
    let bubble = bubbleSort(arr);
    let end1 = performance.now();

    // Merge Sort
    let start2 = performance.now();
    let merge = mergeSort(arr);
    let end2 = performance.now();

    // Display Results
    document.getElementById("bubbleResult").innerHTML =
        `<b>Bubble Sort:</b><br>
        Sorted: ${bubble.sorted}<br>
        Comparisons: ${bubble.comparisons}<br>
        Time Complexity: O(n²)<br>
        Execution Time: ${(end1 - start1).toFixed(4)} ms`;

    document.getElementById("mergeResult").innerHTML =
        `<b>Merge Sort:</b><br>
        Sorted: ${merge.sorted}<br>
        Comparisons: ${merge.comparisons}<br>
        Time Complexity: O(n log n)<br>
        Execution Time: ${(end2 - start2).toFixed(4)} ms`;
}

</script>

</body>
</html>
